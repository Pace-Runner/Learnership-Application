name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ./frontend

      - name: Lint app
        run: npm run lint
        working-directory: ./frontend

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ./frontend

      - name: Build app
        run: npm run build
        working-directory: ./frontend

  applicant-tests:
    name: Applicant tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ./frontend

      - name: Run applicant tests with coverage
        run: npm run test -- --silent=true src/App.test.jsx src/pages/UserPages.test.jsx src/pages/ApplicantProfile.coverage.test.jsx src/pages/ApplicantSearchListings.test.jsx
        working-directory: ./frontend

  provider-tests:
    name: Provider tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ./frontend

      - name: Run provider tests with coverage
        run: npm run test -- --silent=true src/pages/ProviderPage.test.jsx src/pages/ProviderPostListing.acceptance.test.jsx src/pages/ProviderEditDeleteListing.acceptance.test.jsx
        working-directory: ./frontend

  admin-tests:
    name: Admin tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ./frontend

      - name: Run admin tests with coverage
        run: npm run test -- --silent=true src/pages/AdminPage.test.jsx
        working-directory: ./frontend

  admin-moderation-tests:
    name: Admin moderation tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ./frontend

      - name: Run admin moderation tests with coverage
        run: npm run test -- --silent=true src/pages/AdminModerationQueue.test.jsx
        working-directory: ./frontend

  role-based-routing-tests:
    name: Role-based routing tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ./frontend

      - name: Run role-based routing tests with coverage
        run: npm run test -- --silent=true src/RoleBasedRouting.test.jsx
        working-directory: ./frontend